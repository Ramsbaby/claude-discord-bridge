# Jarvis — Docker Compose
# Windows/Linux 설치: docker compose up -d

services:
  jarvis:
    build: .
    container_name: jarvis
    restart: unless-stopped
    env_file: .env
    environment:
      - JARVIS_HOME=/jarvis
      - NODE_ENV=production
    volumes:
      # 데이터 영속화 (컨테이너 재시작 시 유지)
      - ./rag:/jarvis/rag
      - ./inbox:/jarvis/inbox
      - ./logs:/jarvis/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
