# Jarvis — AI Company-in-a-Box Docker Compose
# Usage: docker compose up -d

services:
  bot:
    build: .
    container_name: jarvis
    restart: unless-stopped
    env_file: discord/.env
    volumes:
      # Claude CLI authentication (read-only)
      - ~/.claude:/root/.claude:ro
      # Persistent data
      - ./context:/app/context
      - ./state:/app/state
      - ./logs:/app/logs
      - ./rag:/app/rag
      - ./results:/app/results
      - ./plugins:/app/plugins:ro
      # Config overrides (read-only)
      - ./discord/personas.json:/app/discord/personas.json:ro
      - ./config:/app/config:ro
    environment:
      - NODE_ENV=production
      - BOT_HOME=/app
    healthcheck:
      test: ["CMD", "pgrep", "-f", "discord-bot.js"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
