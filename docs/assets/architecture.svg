  <rect x="552" y="357" width="230" height="50" rx="5" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="667" y="378" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#f0883e">Alerts</text>
  <text x="667" y="395" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Discord DM + ntfy push · Galaxy</text>

