  <text x="194" y="453" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#56d364">LanceDB · rag-engine.mjs</text>
  <text x="194" y="467" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">BM25 + vector hybrid  ·  Obsidian Vault auto-indexed</text>
  <text x="194" y="481" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">98% token compression: 315K → 5.4K</text>

