  <!-- claude -p highlight box -->
  <rect x="18" y="244" width="764" height="66" rx="6" fill="#1a2840" stroke="#388bfd" stroke-width="2"/>
  <rect x="18" y="244" width="4" height="66" fill="#388bfd" rx="2"/>
  <text x="400" y="266" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#79c0ff">claude -p</text>
