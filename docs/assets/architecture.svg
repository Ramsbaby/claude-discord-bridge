  <path d="M 190,318 L 140,336" fill="none" stroke="#388bfd" stroke-width="1.2" marker-end="url(#a)"/>
  <path d="M 400,318 L 400,336" fill="none" stroke="#3fb950" stroke-width="1.2" marker-end="url(#ag)"/>
  <path d="M 610,318 L 660,336" fill="none" stroke="#f0883e" stroke-width="1.2" marker-end="url(#ao)"/>

