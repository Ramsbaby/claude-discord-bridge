  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117"/>

  <!-- ── Title ── -->
  <text x="400" y="22" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Jarvis — System Architecture</text>
  <text x="400" y="38" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#6e7681">claude -p (Claude Max, $0/call)  ·  Discord  ·  76 cron tasks  ·  LanceDB RAG  ·  4-layer self-healing</text>

