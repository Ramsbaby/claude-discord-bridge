<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3fb950"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f0883e"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="14" font-weight="700" fill="#e6edf3" letter-spacing="0.5">Jarvis — Architecture</text>
  <text x="400" y="44" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">claude -p (Claude Max, no API cost)  ·  Discord  ·  cron  ·  local RAG  ·  self-healing</text>

  <!-- ── INPUT COLUMN ── -->
  <!-- Discord -->
  <rect x="20" y="68" width="140" height="54" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="90" y="90" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="600" fill="#58a6ff">Discord</text>
  <text x="90" y="107" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">user messages, slash cmds</text>

  <!-- Cron -->
  <rect x="20" y="140" width="140" height="54" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="90" y="162" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="600" fill="#58a6ff">Cron (76 tasks)</text>
  <text x="90" y="179" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">jarvis-cron.sh, tasks.json</text>

  <!-- CLI -->
  <rect x="20" y="212" width="140" height="54" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="90" y="234" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="600" fill="#58a6ff">CLI / Webhooks</text>
  <text x="90" y="251" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">ask-claude.sh, triggers</text>

  <!-- ── ARROWS: inputs → core ── -->
  <line x1="160" y1="95" x2="218" y2="95" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="160" y1="167" x2="218" y2="167" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="160" y1="239" x2="218" y2="239" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── CORE ENGINE ── -->
  <rect x="222" y="58" width="194" height="214" rx="10" fill="#161b22" stroke="#388bfd" stroke-width="2"/>
  <text x="319" y="80" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="700" fill="#388bfd">Core Engine</text>

  <rect x="234" y="90" width="170" height="34" rx="5" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="319" y="112" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#e6edf3">discord-bot.js</text>

  <rect x="234" y="132" width="170" height="34" rx="5" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="319" y="154" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#e6edf3">claude-runner.js</text>

  <rect x="234" y="174" width="170" height="34" rx="5" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="319" y="196" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#e6edf3">context-builder + RAG inject</text>

  <rect x="234" y="216" width="170" height="40" rx="5" fill="#1a2840" stroke="#388bfd" stroke-width="1.5"/>
  <text x="319" y="233" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="700" fill="#79c0ff">claude -p</text>
  <text x="319" y="249" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#58a6ff">Claude Max  ·  $0 per call</text>

  <!-- ── ARROWS: core → outputs ── -->
  <line x1="416" y1="95" x2="474" y2="95" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="416" y1="167" x2="474" y2="167" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="416" y1="239" x2="474" y2="239" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- ── OUTPUT COLUMN ── -->
  <!-- Discord reply -->
  <rect x="478" y="68" width="140" height="54" rx="6" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="548" y="90" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="600" fill="#58a6ff">Discord Reply</text>
  <text x="548" y="107" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">real-time, channel routing</text>

  <!-- Reports -->
  <rect x="478" y="140" width="140" height="54" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="548" y="162" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="600" fill="#3fb950">Reports</text>
  <text x="548" y="179" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">standup, briefing, health</text>

  <!-- Alerts -->
  <rect x="478" y="212" width="140" height="54" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="548" y="234" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="600" fill="#f0883e">Alerts</text>
  <text x="548" y="251" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">Discord + ntfy push</text>

  <!-- ── ARROWS: core → bottom row ── -->
  <line x1="319" y1="272" x2="319" y2="302" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="319" y1="272" x2="640" y2="302" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- ── MEMORY ROW ── -->
  <rect x="20" y="306" width="300" height="70" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="170" y="328" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="700" fill="#3fb950">Memory</text>
  <text x="170" y="346" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">LanceDB RAG  ·  rag-engine.mjs  ·  hybrid search</text>
  <text x="170" y="364" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">Obsidian Vault  ·  auto-indexed  ·  98% compression</text>

  <!-- ── SELF-HEALING ROW ── -->
  <rect x="340" y="306" width="440" height="70" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="560" y="328" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="700" fill="#f0883e">Self-Healing (4 layers)</text>
  <text x="560" y="346" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">L0 preflight  ·  L1 launchd KeepAlive  ·  L2 watchdog (180s)  ·  L3 guardian</text>
  <text x="560" y="364" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">No human intervention needed  ·  macOS launchd + Linux Docker</text>
</svg>
