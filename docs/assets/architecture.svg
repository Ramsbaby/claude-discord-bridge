  <text x="590" y="453" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">L0 preflight  ·  L1 launchd KeepAlive  ·  L2 watchdog (180s)  ·  L3 guardian (*/3m)</text>
  <text x="590" y="467" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">macOS launchd  +  Linux Docker  ·  auto-restart on crash</text>
  <text x="590" y="481" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">Zero human intervention needed</text>
