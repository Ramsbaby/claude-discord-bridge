  <line x1="293" y1="128" x2="293" y2="147" stroke="#388bfd" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="480" y1="128" x2="480" y2="147" stroke="#388bfd" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="680" y1="128" x2="680" y2="147" stroke="#388bfd" stroke-width="1.2" marker-end="url(#a)"/>

